<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
  <a class="navbar-brand" style="color: red; font-weight: 500;">MOVIE</a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarContent">
    <div class="d-flex ms-auto mt-3 mt-lg-0">
      <input id="searchInput" class="form-control me-2" type="text" placeholder="Search movies...">
      <button onclick="searchMovies()" class="btn btn-danger">Search</button>
      <button onclick="logout()" class="btn btn-outline-light ms-2">Logout</button>
    </div>
  </div>
</nav>

<div class="container-fluid px-5 mt-4">
  <h3>WatchList</h3>
  <div id="bookmarkContainer" class="d-flex overflow-auto gap-3 pb-3"></div>
  <h3 id="recentTitle" class="mt-4">Popular Movies</h3>
  <div id="recentContainer" class="d-flex overflow-auto gap-3 pb-3"></div>
</div>
<script src="index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
